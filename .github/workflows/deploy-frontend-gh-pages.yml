name: Deploy SAR Dashboard Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'sar-dashboard-v3/**'
      - '.github/workflows/deploy-frontend-gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sar-dashboard-v3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sar-dashboard-v3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static frontend with repository base path
        run: npm run build -- --base="/${{ github.event.repository.name }}/"

      - name: Add SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sar-dashboard-v3/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
