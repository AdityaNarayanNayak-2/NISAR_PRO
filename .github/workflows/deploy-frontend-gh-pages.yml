name: Deploy frontend (sar-dashboard-v3) to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'sar-dashboard-v3/**'
      - '.github/workflows/deploy-frontend-gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sar-dashboard-v3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sar-dashboard-v3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (project pages base path)
        run: npm run build -- --base="/${{ github.event.repository.name }}/"

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Deploy dist/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sar-dashboard-v3/dist
          publish_branch: gh-pages
          force_orphan: true
