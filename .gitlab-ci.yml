stages:
  - build
  - test
  - package
  - security

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  # Use the overlay driver for better performance
  DOCKER_DRIVER: overlay2
  # Disable TLS verification for simple setups (optional, but good for some envs)
  DOCKER_TLS_CERTDIR: ""

# Cache configuration for Rust
.rust_cache: &rust_cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}-rust
    paths:
      - .cargo/
      - target/
      - sar_processor/target/
      - sar_operator_v2/target/
      - sar-gateway/target/

# Cache configuration for Node
.node_cache: &node_cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}-node
    paths:
      - sar-dashboard-v2/node_modules/

# --- Rust Jobs ---

build_rust:
  stage: build
  image: rust:latest
  <<: *rust_cache
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - sar_processor/**/*
        - sar_operator_v2/**/*
        - sar-gateway/**/*
        - Cargo.toml
        - Cargo.lock
  script:
    - echo "Building SAR Processor..."
    - cd sar_processor && cargo build --release && cd ..
    - echo "Building SAR Operator..."
    - cd sar_operator_v2 && cargo build --release && cd ..
    - echo "Building SAR Gateway..."
    - cd sar-gateway && cargo build --release && cd ..
  artifacts:
    paths:
      - sar_processor/target/release/sar_processor
      - sar_operator_v2/target/release/sar_operator_v2
      - sar-gateway/target/release/sar-gateway

test_rust:
  stage: test
  image: rust:latest
  <<: *rust_cache
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - sar_processor/**/*
        - sar_operator_v2/**/*
        - sar-gateway/**/*
        - Cargo.toml
        - Cargo.lock
  script:
    - echo "Testing Rust Components..."
    - cd sar_processor && cargo test && cd ..
    - cd sar_operator_v2 && cargo test && cd ..
    - cd sar-gateway && cargo test && cd ..

audit_rust:
  stage: security
  image: rust:latest
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - sar_processor/**/*
        - sar_operator_v2/**/*
        - sar-gateway/**/*
        - Cargo.toml
        - Cargo.lock
  script:
    - cargo install cargo-audit
    - cd sar_processor && cargo audit
    - cd ../sar_operator_v2 && cargo audit
    - cd ../sar-gateway && cargo audit

# --- Node.js Jobs ---

build_dashboard_code:
  stage: build
  image: node:18
  <<: *node_cache
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - sar-dashboard-v2/**/*
  script:
    - cd sar-dashboard-v2
    - npm install
    - npm run build
  artifacts:
    paths:
      - sar-dashboard-v2/build/

# --- Docker Build & Push (GitLab Registry) ---

docker_build_gateway:
  stage: package
  image: docker:latest
  services:
    - docker:dind
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - sar-gateway/**/*
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - cd sar-gateway
    - docker build -t $CI_REGISTRY_IMAGE/sar-gateway:latest .
    - docker push $CI_REGISTRY_IMAGE/sar-gateway:latest

docker_build_dashboard:
  stage: package
  image: docker:latest
  services:
    - docker:dind
  dependencies:
    - build_dashboard_code
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - sar-dashboard-v2/**/*
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - cd sar-dashboard-v2
    - docker build -t $CI_REGISTRY_IMAGE/sar-dashboard:latest .
    - docker push $CI_REGISTRY_IMAGE/sar-dashboard:latest
