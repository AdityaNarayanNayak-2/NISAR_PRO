apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sarjobs.sar.example.com
spec:
  group: sar.example.com
  names:
    kind: SarJob
    plural: sarjobs
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              scene_id:
                type: string
              output_storage_path:
                type: string
            required:
            - scene_id
            - output_storage_path
          status:
            type: object
            properties:
              phase:
                type: string
              job_name:
                type: string
              message:
                type: string
