apiVersion: apps/v1
kind: Deployment
metadata:
  name: sar-dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sar-dashboard
  template:
    metadata:
      labels:
        app: sar-dashboard
    spec:
      containers:
      - name: sar-dashboard
        image: localhost/sar-dashboard:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sar-dashboard-svc
  namespace: default
spec:
  selector:
    app: sar-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort
